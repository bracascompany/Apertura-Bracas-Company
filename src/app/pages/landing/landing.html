<div class="product-container">
  <div class="product-card">
    <img src="/assets/headphones.png" alt="Nexus Over-Ear Headphones">
    <h3>Nexus Over-Ear Headphones</h3>
    <p class="category">Audio Tech</p>
    <p class="price">$299.99</p>
    <button class="add-btn" (click)="onAddToCart('Nexus Over-Ear Headphones', 299.99, 'Audio Tech', '/assets/headphones.png')">
      Add to Cart
    </button>
  </div>

  <div class="product-card">
    <img src="/assets/smartwatch.png" alt="Smartwatch Pro">
    <h3>Smartwatch Pro</h3>
    <p class="category">Wearables</p>
    <p class="price">$199.99</p>
    <button class="add-btn" (click)="onAddToCart('Smartwatch Pro', 199.99, 'Wearables', '/assets/smartwatch.png')">
      Add to Cart
    </button>
  </div>

  <div class="product-card">
    <img src="https://cogconnected.com/wp-content/uploads/2023/05/JBL_Quantum_TWS_Air_Earbuds_box.jpg" alt="Quantum Wireless Buds">
    <h3>Quantum Wireless Buds</h3>
    <p class="category">Audio Tech</p>
    <p class="price">$149.99</p>
    <button class="add-btn" (click)="onAddToCart('Quantum Wireless Buds', 149.99, 'Audio Tech', 'https://cogconnected.com/wp-content/uploads/2023/05/JBL_Quantum_TWS_Air_Earbuds_box.jpg')">
      Add to Cart
    </button>
  </div>
</div>
